version: '3.8'

services:
  # RAG服务
  rag-service:
    build: ./rag-service
    ports:
      - "8000:8000"
    volumes:
      - ./rag-service/uploaded_docs:/app/uploaded_docs
      - ./rag-service/chroma_db:/app/chroma_db
    restart: always
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - openclaw-network

  # OpenClaw服务
  openclaw:
    build: ./openclaw
    ports:
      - "3000:3000"
    depends_on:
      - rag-service
    restart: always
    environment:
      - NODE_ENV=production
      - RAG_SERVICE_URL=http://rag-service:8000
    networks:
      - openclaw-network

networks:
  openclaw-network:
    driver: bridge